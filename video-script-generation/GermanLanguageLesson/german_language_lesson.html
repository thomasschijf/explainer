<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wortfluss — Learn German</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080d;--surface:rgba(255,255,255,.04);--surface2:rgba(255,255,255,.07);
  --glass:rgba(255,255,255,.03);--glass-border:rgba(255,255,255,.08);
  --text:#e8e8ec;--muted:#7a7d8e;--dim:#4a4d5e;
  --blue:#6ea8fe;--teal:#5eead4;--purple:#c4b5fd;--rose:#fda4af;
  --gold:#fcd34d;--green:#86efac;--red:#fca5a5;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}

/* ── Ambient orbs ── */
.orb{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;will-change:transform}
.orb-1{width:600px;height:600px;background:radial-gradient(circle,rgba(110,168,254,.12),transparent 70%);top:-15%;left:-10%;animation:drift1 25s infinite ease-in-out}
.orb-2{width:500px;height:500px;background:radial-gradient(circle,rgba(94,234,212,.1),transparent 70%);bottom:-10%;right:-8%;animation:drift2 30s infinite ease-in-out}
.orb-3{width:400px;height:400px;background:radial-gradient(circle,rgba(196,181,253,.08),transparent 70%);top:40%;left:50%;animation:drift3 20s infinite ease-in-out}
@keyframes drift1{0%,100%{transform:translate(0,0)}50%{transform:translate(60px,40px)}}
@keyframes drift2{0%,100%{transform:translate(0,0)}50%{transform:translate(-50px,-30px)}}
@keyframes drift3{0%,100%{transform:translate(0,0)}33%{transform:translate(-40px,30px)}66%{transform:translate(30px,-20px)}}
body.celebrate .orb{filter:blur(90px);transition:filter .3s}
body.celebrate .orb-1{background:radial-gradient(circle,rgba(134,239,172,.2),transparent 70%)}

/* ── Layout ── */
.app{height:100vh;display:flex;flex-direction:column;max-width:680px;margin:0 auto;position:relative;z-index:1}

/* ── Top bar ── */
.top-bar{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.brand{font-size:.85rem;font-weight:700;letter-spacing:.04em;background:linear-gradient(135deg,var(--blue),var(--teal));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.progress-pill{display:flex;align-items:center;gap:8px;font-size:.75rem;color:var(--muted)}
.progress-track{width:100px;height:3px;background:var(--surface2);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--teal));border-radius:99px;transition:width .6s ease;width:0%}
.score-chip{font-size:.75rem;color:var(--green);font-weight:600}

/* ── Chat ── */
.chat{flex:1;overflow-y:auto;padding:8px 20px 16px;display:flex;flex-direction:column;gap:6px;scroll-behavior:smooth;-ms-overflow-style:none;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.06) transparent}
.chat::-webkit-scrollbar{width:4px}
.chat::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:99px}

/* ── Messages ── */
.msg{display:flex;gap:10px;max-width:92%;animation:msgIn .4s ease both;opacity:0}
@keyframes msgIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.msg-teacher{align-self:flex-start}
.msg-student{align-self:flex-end;flex-direction:row-reverse}
.msg-system{align-self:center;max-width:100%}

.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;flex-shrink:0;margin-top:4px}
.avatar-t{background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff}
.avatar-s{background:linear-gradient(135deg,var(--teal),var(--green));color:#000}

.bubble{padding:12px 16px;border-radius:18px;font-size:.92rem;line-height:1.65;max-width:100%}
.bubble-t{background:var(--surface);border:1px solid var(--glass-border);border-bottom-left-radius:4px}
.bubble-s{background:linear-gradient(135deg,rgba(94,234,212,.12),rgba(110,168,254,.08));border:1px solid rgba(94,234,212,.15);border-bottom-right-radius:4px}
.bubble .de{color:var(--teal);font-weight:600}
.bubble .en{color:var(--gold);font-weight:500}
.bubble em{color:var(--purple);font-style:normal;font-weight:500}
.bubble strong{color:var(--text);font-weight:600}

/* Typing indicator */
.typing{display:flex;gap:4px;padding:14px 18px}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:typeDot 1.4s infinite ease-in-out}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes typeDot{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-5px)}}

/* ── System cards ── */
.system-card{text-align:center;padding:32px 20px;width:100%}
.system-card h2{font-size:1.6rem;font-weight:800;background:linear-gradient(135deg,var(--blue),var(--teal),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
.system-card p{color:var(--muted);font-size:.88rem}
.system-card.finish-card h2{font-size:1.8rem}
.system-card.finish-card .stat{margin-top:8px;font-size:.95rem;color:var(--muted)}
.system-card.finish-card .stat b{color:var(--text)}
.system-card.finish-card .quote{margin-top:24px;font-size:.88rem;color:var(--teal);line-height:1.7;font-style:italic;opacity:.8}

/* ── Morph card ── */
.morph-card{background:var(--surface);border:1px solid var(--glass-border);border-radius:16px;padding:24px 28px;text-align:center;width:100%}
.morph-row{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:10px}
.morph-word{font-size:1.8rem;font-weight:700;letter-spacing:.02em;opacity:0;transform:scale(.9);transition:all .5s ease}
.morph-word.show{opacity:1;transform:scale(1)}
.morph-from{color:var(--gold)}
.morph-to{color:var(--teal)}
.morph-from mark,.morph-to mark{background:none;font-weight:800;position:relative}
.morph-from mark{color:var(--rose)}
.morph-to mark{color:var(--green)}
.morph-arrow{font-size:1.4rem;color:var(--muted);opacity:0;transition:all .4s ease}
.morph-arrow.show{opacity:1}
.morph-label{font-size:.8rem;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;opacity:0;transition:opacity .4s ease}
.morph-label.show{opacity:1}

/* ── Input area ── */
.input-area{flex-shrink:0;padding:12px 20px 24px;display:flex;flex-direction:column;gap:8px}
.input-area:empty{padding:0}

/* Text input */
.text-input-wrap{display:flex;gap:8px;align-items:center}
.text-input{flex:1;background:var(--surface);border:1.5px solid var(--glass-border);border-radius:14px;padding:13px 18px;font-size:.95rem;color:var(--text);font-family:inherit;outline:none;transition:border-color .3s,box-shadow .3s}
.text-input:focus{border-color:var(--blue);box-shadow:0 0 20px rgba(110,168,254,.1)}
.text-input::placeholder{color:var(--dim)}
.text-input.correct-glow{border-color:var(--green);box-shadow:0 0 24px rgba(134,239,172,.15)}
.text-input.wrong-glow{border-color:var(--red);box-shadow:0 0 24px rgba(252,165,165,.12)}
.hint-text{font-size:.78rem;color:var(--dim);padding-left:4px;animation:msgIn .3s ease both}

.send-btn{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--teal));border:none;color:#fff;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.send-btn:hover{transform:scale(1.08);filter:brightness(1.1)}
.send-btn:active{transform:scale(.95)}

/* Choice chips */
.choices{display:flex;flex-direction:column;gap:6px}
.choice-chip{background:var(--surface);border:1.5px solid var(--glass-border);border-radius:14px;padding:13px 18px;font-size:.92rem;color:var(--text);cursor:pointer;text-align:left;font-family:inherit;transition:all .25s;position:relative;overflow:hidden}
.choice-chip:hover{border-color:var(--blue);background:rgba(110,168,254,.06);transform:translateX(4px)}
.choice-chip:active{transform:translateX(2px) scale(.99)}

/* Builder */
.builder-card{background:var(--surface);border:1px solid var(--glass-border);border-radius:16px;padding:18px;width:100%}
.builder-drop{min-height:48px;background:rgba(255,255,255,.02);border:1.5px dashed var(--glass-border);border-radius:12px;padding:8px 10px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:12px;transition:all .3s}
.builder-drop:empty::after{content:'Tap words to build the sentence...';color:var(--dim);font-size:.84rem}
.builder-drop.correct{border-color:var(--green);border-style:solid;box-shadow:0 0 20px rgba(134,239,172,.08)}
.builder-drop.wrong{border-color:var(--red);border-style:solid}
.builder-bank{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.word-chip{padding:9px 14px;border-radius:10px;font-size:.88rem;font-weight:500;cursor:pointer;transition:all .25s;user-select:none}
.bank-chip{background:var(--surface2);border:1px solid var(--glass-border);color:var(--text)}
.bank-chip:hover{border-color:var(--blue);transform:translateY(-2px)}
.bank-chip.used{opacity:.2;transform:none;cursor:default}
.placed-chip{background:linear-gradient(135deg,rgba(110,168,254,.15),rgba(94,234,212,.1));border:1px solid rgba(110,168,254,.25);color:var(--teal)}
.placed-chip:hover{background:rgba(252,165,165,.1);border-color:var(--rose)}
.builder-check{background:linear-gradient(135deg,var(--blue),var(--teal));color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:.88rem;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s}
.builder-check:hover{filter:brightness(1.1);transform:translateY(-1px)}
.builder-check:disabled{opacity:.3;cursor:default;transform:none}

/* Continue tap */
.continue-tap{text-align:center;padding:8px;font-size:.8rem;color:var(--dim);cursor:pointer;animation:pulse 2s infinite ease-in-out}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:.8}}

/* Celebrate flash */
@keyframes celebrateFlash{0%{opacity:0}15%{opacity:1}100%{opacity:0}}
.celebrate-overlay{position:fixed;inset:0;background:radial-gradient(ellipse at center,rgba(134,239,172,.06),transparent 70%);pointer-events:none;opacity:0;z-index:999}
.celebrate-overlay.flash{animation:celebrateFlash .8s ease}

@media(max-width:600px){
  .app{max-width:100%}
  .morph-word{font-size:1.3rem}
  .system-card h2{font-size:1.3rem}
}
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="celebrate-overlay" id="celebrateOverlay"></div>

<div class="app">
  <div class="top-bar">
    <div class="brand">WORTFLUSS</div>
    <div class="progress-pill">
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <span class="score-chip" id="scoreChip"></span>
    </div>
  </div>
  <div class="chat" id="chat"></div>
  <div class="input-area" id="inputArea"></div>
</div>

<script>
const chat = document.getElementById('chat');
const inputArea = document.getElementById('inputArea');
const progressFill = document.getElementById('progressFill');
const scoreChip = document.getElementById('scoreChip');
const celebrateOverlay = document.getElementById('celebrateOverlay');

let step = 0;
let score = { correct: 0, total: 0, streak: 0, best: 0 };

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

function scrollChat() {
  requestAnimationFrame(() => { chat.scrollTop = chat.scrollHeight; });
}

function updateScore() {
  scoreChip.textContent = score.correct ? `${score.correct} correct` : '';
}

function updateProgress() {
  const pct = Math.min(Math.round((step / FLOW.length) * 100), 100);
  progressFill.style.width = pct + '%';
}

function celebrate() {
  celebrateOverlay.classList.remove('flash');
  void celebrateOverlay.offsetWidth;
  celebrateOverlay.classList.add('flash');
  document.body.classList.add('celebrate');
  setTimeout(() => document.body.classList.remove('celebrate'), 600);
}

function renderText(raw) {
  return raw
    .replace(/\*([^*]+)\*/g, '<span class="de">$1</span>')
    .replace(/_([^_]+)_/g, '<em>$1</em>');
}

/* ── Message creation ── */

function addTypingIndicator() {
  const div = document.createElement('div');
  div.className = 'msg msg-teacher';
  div.id = 'typingIndicator';
  div.innerHTML = `<div class="avatar avatar-t">T</div><div class="bubble bubble-t typing"><span></span><span></span><span></span></div>`;
  chat.appendChild(div);
  scrollChat();
}

function removeTypingIndicator() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

async function addTeacher(text, fast) {
  addTypingIndicator();
  const delay = fast ? 400 : Math.min(350 + text.length * 10, 1800);
  await wait(delay);
  removeTypingIndicator();
  const div = document.createElement('div');
  div.className = 'msg msg-teacher';
  div.innerHTML = `<div class="avatar avatar-t">T</div><div class="bubble bubble-t">${renderText(text)}</div>`;
  chat.appendChild(div);
  scrollChat();
  await wait(fast ? 200 : 400);
}

function addStudent(text) {
  const div = document.createElement('div');
  div.className = 'msg msg-student';
  div.innerHTML = `<div class="bubble bubble-s">${renderText(text)}</div><div class="avatar avatar-s">Y</div>`;
  chat.appendChild(div);
  scrollChat();
}

async function addSystem(text, sub) {
  const div = document.createElement('div');
  div.className = 'msg msg-system';
  div.innerHTML = `<div class="system-card"><h2>${text}</h2>${sub ? `<p>${sub}</p>` : ''}</div>`;
  chat.appendChild(div);
  scrollChat();
  await wait(1200);
}

async function addMorph(from, to, label, fromHl, toHl) {
  const fhtml = fromHl ? from.replace(fromHl, `<mark>${fromHl}</mark>`) : from;
  const thtml = toHl ? to.replace(toHl, `<mark>${toHl}</mark>`) : to;
  const div = document.createElement('div');
  div.className = 'msg msg-system';
  div.innerHTML = `<div class="morph-card">
    <div class="morph-row">
      <div class="morph-word morph-from" id="mf">${fhtml}</div>
      <div class="morph-arrow" id="ma">→</div>
      <div class="morph-word morph-to" id="mt">${thtml}</div>
    </div>
    <div class="morph-label" id="ml">${label}</div>
  </div>`;
  chat.appendChild(div);
  scrollChat();
  await wait(300);
  div.querySelector('.morph-from').classList.add('show');
  await wait(500);
  div.querySelector('.morph-arrow').classList.add('show');
  await wait(500);
  div.querySelector('.morph-to').classList.add('show');
  await wait(400);
  div.querySelector('.morph-label').classList.add('show');
  await wait(600);
}

/* ── Input components ── */

function clearInput() { inputArea.innerHTML = ''; }

function showContinueTap() {
  return new Promise(resolve => {
    clearInput();
    const div = document.createElement('div');
    div.className = 'continue-tap';
    div.textContent = 'tap to continue';
    div.onclick = () => { clearInput(); resolve(); };
    inputArea.appendChild(div);

    const handler = (e) => {
      if (e.target === div || e.target.closest('.chat')) {
        clearInput();
        document.removeEventListener('click', handler);
        resolve();
      }
    };
    setTimeout(() => document.addEventListener('click', handler), 200);
  });
}

function showChoice(options, correctIdx, prompt) {
  return new Promise(resolve => {
    clearInput();
    if (prompt) {
      const p = document.createElement('div');
      p.style.cssText = 'font-size:.82rem;color:var(--muted);padding:0 4px 4px;';
      p.textContent = prompt;
      inputArea.appendChild(p);
    }
    const wrap = document.createElement('div');
    wrap.className = 'choices';
    options.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'choice-chip';
      btn.textContent = opt;
      btn.onclick = () => {
        clearInput();
        addStudent(opt);
        resolve(i === correctIdx);
      };
      wrap.appendChild(btn);
    });
    inputArea.appendChild(wrap);
  });
}

function showTextInput(placeholder, hint) {
  return new Promise(resolve => {
    clearInput();
    const wrap = document.createElement('div');
    wrap.className = 'text-input-wrap';
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.className = 'text-input';
    inp.placeholder = placeholder || 'Type in German...';
    inp.autocomplete = 'off';
    inp.spellcheck = false;
    const btn = document.createElement('button');
    btn.className = 'send-btn';
    btn.innerHTML = '→';

    const submit = () => {
      const val = inp.value.trim();
      if (!val) return;
      clearInput();
      addStudent(val);
      resolve(val);
    };
    btn.onclick = submit;
    inp.onkeydown = e => { if (e.key === 'Enter') submit(); };

    wrap.appendChild(inp);
    wrap.appendChild(btn);
    inputArea.appendChild(wrap);

    if (hint) {
      const h = document.createElement('div');
      h.className = 'hint-text';
      h.textContent = '💡 ' + hint;
      inputArea.appendChild(h);
    }

    setTimeout(() => inp.focus(), 100);
  });
}

function showBuilder(words, answer) {
  return new Promise(resolve => {
    const div = document.createElement('div');
    div.className = 'msg msg-system';
    const card = document.createElement('div');
    card.className = 'builder-card';
    const drop = document.createElement('div');
    drop.className = 'builder-drop';
    const bank = document.createElement('div');
    bank.className = 'builder-bank';
    const checkBtn = document.createElement('button');
    checkBtn.className = 'builder-check';
    checkBtn.textContent = 'Check →';

    const shuffled = [...words].sort(() => Math.random() - 0.5);
    const bankChips = [];
    const placed = [];

    shuffled.forEach(w => {
      const chip = document.createElement('span');
      chip.className = 'word-chip bank-chip';
      chip.textContent = w;
      chip.onclick = () => {
        if (chip.classList.contains('used')) return;
        chip.classList.add('used');
        placed.push(w);
        const pc = document.createElement('span');
        pc.className = 'word-chip placed-chip';
        pc.textContent = w;
        pc.onclick = () => {
          drop.removeChild(pc);
          placed.splice(placed.indexOf(w), 1);
          chip.classList.remove('used');
        };
        drop.appendChild(pc);
        scrollChat();
      };
      bankChips.push(chip);
      bank.appendChild(chip);
    });

    checkBtn.onclick = () => {
      const built = placed.join(' ');
      const correct = answer.join(' ');
      checkBtn.disabled = true;

      if (built === correct) {
        drop.classList.add('correct');
        setTimeout(() => {
          addStudent(correct);
          resolve(true);
        }, 400);
      } else {
        drop.classList.add('wrong');
        setTimeout(() => {
          drop.classList.remove('wrong');
          addStudent(built);
          resolve(false);
        }, 600);
      }
    };

    card.appendChild(drop);
    card.appendChild(bank);
    card.appendChild(checkBtn);
    div.appendChild(card);
    chat.appendChild(div);
    scrollChat();
    clearInput();
  });
}

/* ── Answer checking ── */

function normalize(s) {
  return s.toLowerCase().replace(/[.!?,;:]+$/g, '').trim();
}

function checkAnswer(userVal, answer, altAnswers) {
  const n = normalize(userVal);
  if (n === normalize(answer)) return true;
  if (altAnswers && altAnswers.some(a => n === normalize(a))) return true;
  return false;
}

/* ── Conversation flow ── */

const FLOW = [
  { run: async () => {
    await addSystem('Wortfluss', 'A new way to learn German');
  }},
  { run: async () => {
    await addTeacher("What if I told you that you already speak some German?");
    await addTeacher("Let's start with something that looks very familiar...");
    await addTeacher("What do you think *Ich will* means?");
    const correct = await showChoice(['I will (future)', 'I want', 'I wish'], 1);
    score.total++;
    if (correct) {
      score.correct++; score.streak++; celebrate();
      await addTeacher("You saw right through it! Most people guess 'I will' — but *Ich will* means *I want*.");
    } else {
      score.streak = 0;
      await addTeacher("Almost everyone says that! Here's the surprise: *Ich will* actually means *I want*.");
    }
    updateScore();
  }},
  { run: async () => {
    await addTeacher("The English word 'will' actually _comes from_ the German word for want.");
    await addTeacher("We still use it that way: 'the will of the people' = the _want_ of the people. 'I don't have the will' = I don't have the _want_.");
    await addMorph('will', 'wollen', 'want → to want', null, null);
    await addTeacher("The infinitive is *wollen* — notice the link to _voluntary_?");
  }},
  { run: async () => {
    await addTeacher("Now, something beautiful: German doesn't need a word for 'will' to talk about the future.");
    await addTeacher("*Morgen* means both 'tomorrow' AND 'morning' — just like Spanish _mañana_.");
    await addTeacher("So 'I will help tomorrow' is simply the present tense + morgen. Try it:");
    const val = await showTextInput("Translate: 'I will help tomorrow'", "Just present tense + morgen");
    score.total++;
    if (checkAnswer(val, 'Ich helfe morgen')) {
      score.correct++; score.streak++; celebrate();
      await addTeacher("*Genau!* Just the present tense and the time word. No 'will' needed.");
    } else {
      score.streak = 0;
      await addTeacher("It's *Ich helfe morgen* — literally 'I help tomorrow.' The present tense does the work!");
    }
    updateScore();
  }},
  { run: async () => {
    await addSystem('The Sound Shift Code', 'Your German superpower');
    await addTeacher("English and German are siblings — but certain sounds _shifted_ between them.");
    await addTeacher("Learn these patterns, and you can _guess_ German words you've never seen.");
  }},
  { run: async () => {
    await addMorph('eat', 'essen', 'T → S shift', 't', 'ss');
    await addTeacher("English T became German S. Using this code, what is 'water' in German?");
    const val = await showTextInput("water → ?", "Apply T → SS, and remember: W sounds like V");
    score.total++;
    if (checkAnswer(val, 'Wasser')) {
      score.correct++; score.streak++; celebrate();
      await addTeacher("Brilliant! *Wasser* — you cracked the code.");
    } else {
      score.streak = 0;
      await addTeacher("It's *Wasser* — the T became SS, and German W sounds like V!");
    }
    updateScore();
  }},
  { run: async () => {
    await addTeacher("Try another: what is 'better' in German?");
    const val = await showTextInput("better → ?");
    score.total++;
    if (checkAnswer(val, 'besser')) {
      score.correct++; score.streak++; celebrate();
      await addTeacher("*Besser!* You're getting the hang of this.");
    } else {
      score.streak = 0;
      await addTeacher("It's *besser* — the TT became SS. Same T→S pattern!");
    }
    updateScore();
  }},
  { run: async () => {
    await addMorph('thank', 'danke', 'TH → D shift', 'th', 'd');
    await addTeacher("English TH becomes German D. So 'the' in German becomes...");
    const val = await showTextInput("the → ?", "TH → D");
    score.total++;
    if (checkAnswer(val, 'die', ['das', 'der'])) {
      score.correct++; score.streak++; celebrate();
      await addTeacher("Yes! German has *die*, *der*, and *das* — all from 'the' with the TH→D shift.");
    } else {
      score.streak = 0;
      await addTeacher("It's *die* (or *der*, *das*) — the TH became D, just like thank → *danke*.");
    }
    updateScore();
  }},
  { run: async () => {
    await addMorph('hope', 'hoffen', 'P → F shift', 'p', 'ff');
    await addTeacher("And one more: P becomes F. Hope → *hoffen*. These shifts let you decode hundreds of German words from English!");
  }},
  { run: async () => {
    await addSystem('Building Sentences', 'From words to real German');
    await addTeacher("Quick vocab: *ich* = I, *mich* = me, *wir* = we, *Sie* = they / you (formal), *es* = it");
    await addTeacher("With *wir* and *Sie*, just use the base verb form — no changes needed.");
    await addTeacher("How would you say 'They see me'?");
    const val = await showTextInput("They see me = ?");
    score.total++;
    if (checkAnswer(val, 'Sie sehen mich')) {
      score.correct++; score.streak++; celebrate();
      await addTeacher("*Sie sehen mich* — perfect! You're building real German sentences.");
    } else {
      score.streak = 0;
      await addTeacher("It's *Sie sehen mich*. Sie = they, sehen = see, mich = me.");
    }
    updateScore();
  }},
  { run: async () => {
    await addTeacher("German has a key word order rule: time expressions come _before_ *nicht* (not).");
    await addTeacher("Build this: 'The children are not coming tomorrow'");
    const correct = await showBuilder(
      ['Die Kinder', 'kommen', 'morgen', 'nicht', 'sind'],
      ['Die Kinder', 'kommen', 'morgen', 'nicht']
    );
    score.total++;
    if (correct) {
      score.correct++; score.streak++; celebrate();
      await addTeacher("*Die Kinder kommen morgen nicht* — notice how morgen comes before nicht!");
    } else {
      score.streak = 0;
      await addTeacher("The correct order is *Die Kinder kommen morgen nicht*. Time expression before nicht!");
    }
    updateScore();
  }},
  { run: async () => {
    await addTeacher("For questions, swap the subject and verb — this is called _inversion_.");
    await addTeacher("Same sentence as a question: 'Are the children coming tomorrow?'");
    const correct = await showBuilder(
      ['Kommen', 'die Kinder', 'morgen', 'nicht', 'Die Kinder'],
      ['Kommen', 'die Kinder', 'morgen']
    );
    score.total++;
    if (correct) {
      score.correct++; score.streak++; celebrate();
      await addTeacher("*Kommen die Kinder morgen?* — the verb jumps to the front. Same order for commands, just change your tone!");
    } else {
      score.streak = 0;
      await addTeacher("It's *Kommen die Kinder morgen?* — verb first, then subject. That's inversion!");
    }
    updateScore();
  }},
  { run: async () => {
    await addSystem('The Verb Sandwich', 'The most beautiful part of German');
    await addTeacher("When you use two verbs, German wraps _everything_ between them like a sandwich. The second verb goes to the very end.");
    await addTeacher("Why? Because German saves the key information for last. The listener can't assume what you're saying — they must hear everything before the picture is complete. This _prevents interruption_.");
  }},
  { run: async () => {
    await addTeacher("Build: 'I want to buy it tomorrow'");
    await addTeacher("Think: Verb 1 → everything → Verb 2");
    const correct = await showBuilder(
      ['Ich will', 'es', 'morgen', 'kaufen', 'nicht'],
      ['Ich will', 'es', 'morgen', 'kaufen']
    );
    score.total++;
    if (correct) {
      score.correct++; score.streak++; celebrate();
      await addTeacher("*Ich will es morgen kaufen!* The listener hears 'I want it tomorrow...' and must _wait_ for *kaufen* to know what you're talking about!");
    } else {
      score.streak = 0;
      await addTeacher("It's *Ich will es morgen kaufen*. 'I want — it tomorrow — to buy.' The second verb seals the sentence!");
    }
    updateScore();
  }},
  { run: async () => {
    await addTeacher("Now the negative version: 'I don't want to buy it tomorrow'");
    const correct = await showBuilder(
      ['Ich will', 'es', 'morgen', 'nicht', 'kaufen', 'kommen'],
      ['Ich will', 'es', 'morgen', 'nicht', 'kaufen']
    );
    score.total++;
    if (correct) {
      score.correct++; score.streak++; celebrate();
      await addTeacher("*Ich will es morgen nicht kaufen.* Same sandwich — nicht goes before the final verb, but after the time expression!");
    } else {
      score.streak = 0;
      await addTeacher("It's *Ich will es morgen nicht kaufen*. Between the two verbs: es, morgen, nicht — in that order.");
    }
    updateScore();
  }},
  { run: async () => {
    await addTeacher("German modal verbs are irregular: *wollen* → ich will, *können* → ich kann, *müssen* → ich muss");
    await addTeacher("Careful! *Ich muss nicht* means 'I don't _have to_' — NOT 'I must not'! What does *Ich muss nicht essen* mean?");
    const correct = await showChoice(
      ["I don't have to eat", "I must not eat (forbidden)", "I can't eat"],
      0,
      "What does 'Ich muss nicht essen' mean?"
    );
    score.total++;
    if (correct) {
      score.correct++; score.streak++; celebrate();
      await addTeacher("Exactly! *Muss nicht* is the casual 'don't have to' — much lighter than the English 'must not.'");
    } else {
      score.streak = 0;
      await addTeacher("It means 'I don't have to eat.' In German, *muss nicht* is much lighter than English 'must not.'");
    }
    updateScore();
  }},
  { run: async () => {
    await addTeacher("Many Latin verbs in German end in *-ieren*. If English has '-ate,' '-ize,' or '-ify,' just try '-ieren.'");
    await addTeacher("What's 'to organize' in German?");
    const val = await showTextInput("to organize → ?");
    score.total++;
    if (checkAnswer(val, 'organisieren')) {
      score.correct++; score.streak++; celebrate();
      await addTeacher("*Organisieren!* This works for hundreds of words: funktionieren, existieren, informieren...");
    } else {
      score.streak = 0;
      await addTeacher("It's *organisieren*! This pattern works for hundreds of words: funktionieren, existieren, studieren...");
    }
    updateScore();
  }},
  { run: async () => {
    await addSystem('Final Challenge', 'Show what you\'ve learned');
    await addTeacher("Build: 'Can we buy it now?' — remember the sandwich!");
    const correct = await showBuilder(
      ['Können', 'wir', 'es', 'jetzt', 'kaufen', 'morgen', 'nicht'],
      ['Können', 'wir', 'es', 'jetzt', 'kaufen']
    );
    score.total++;
    if (correct) {
      score.correct++; score.streak++; celebrate();
      await addTeacher("*Können wir es jetzt kaufen?* Inversion for the question, sandwich for the two verbs. Beautiful!");
    } else {
      score.streak = 0;
      await addTeacher("It's *Können wir es jetzt kaufen?* — verb first (question), everything in the middle, second verb at the end.");
    }
    updateScore();
  }},
  { run: async () => {
    await addTeacher("Last one. Type: 'I can't stay here now'");
    const val = await showTextInput("I can't stay here now = ?", "Think: Ich kann ... bleiben (sandwich!)");
    score.total++;
    if (checkAnswer(val, 'Ich kann jetzt nicht hier bleiben')) {
      score.correct++; score.streak++; celebrate();
      await addTeacher("*Ich kann jetzt nicht hier bleiben.* You've mastered the sandwich, the word order, _and_ the sound shifts. Incredible.");
    } else {
      score.streak = 0;
      await addTeacher("It's *Ich kann jetzt nicht hier bleiben*. I can — now not here — stay. The listener only understands at the very end!");
    }
    updateScore();
  }},
  { run: async () => {
    await addTeacher("*Gut gemacht!* You've learned to see the hidden connections between English and German.");
    clearInput();
    const div = document.createElement('div');
    div.className = 'msg msg-system';
    const pct = score.total > 0 ? Math.round((score.correct / score.total) * 100) : 0;
    div.innerHTML = `<div class="system-card finish-card">
      <h2>Gut gemacht!</h2>
      <div class="stat"><b>${score.correct}</b> out of <b>${score.total}</b> correct — <b>${pct}%</b></div>
      <div class="quote">"Languages are not thought. They are tools we use in thought.<br>Learning a language that does this differently can be a life-changing experience."</div>
    </div>`;
    chat.appendChild(div);
    scrollChat();
  }}
];

async function run() {
  while (step < FLOW.length) {
    updateProgress();
    await FLOW[step].run();
    step++;
    if (step < FLOW.length) {
      const nextType = FLOW[step];
      if (step > 1) await showContinueTap();
    }
  }
  updateProgress();
}

run();
</script>
